<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WP Snooker Overlay</title>

<style>
body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
}

.overlay{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.scoreboard{
width:90%;
background:#111;
border-top:4px solid gold;
border-bottom:4px solid gold;
color:white;
padding:20px;
}

.header{
text-align:center;
margin-bottom:20px;
}

.header img{
height:180px;
}

#winnerBox{
display:none;
font-size:48px;
font-weight:bold;
color:gold;
}

.score-row{
display:flex;
justify-content:space-between;
align-items:center;
}

.player{
width:30%;
}

.player.right{
text-align:right;
}

.name{
font-size:28px;
font-weight:bold;
}

.score{
font-size:72px;
font-weight:bold;
color:gold;
}

.center{
width:40%;
text-align:center;
}

.frame{
font-size:42px;
font-weight:bold;
color:gold;
}

.breakbox{
text-align:center;
padding-top:20px;
font-size:28px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="scoreboard">

<div class="header">

<div id="logoBox">
<img src="wp-logo.png">
</div>

<div id="winnerBox">
🏆 <span id="winnerName"></span>
</div>

</div>

<div class="score-row">

<div class="player">
<div class="name" id="playerA">นักกีฬา A</div>
<div class="score" id="scoreA">0</div>
</div>

<div class="center">
<div class="frame">
<span id="frameA">0</span>
 -
<span id="frameB">0</span>
</div>
FRAME
</div>

<div class="player right">
<div class="name" id="playerB">นักกีฬา B</div>
<div class="score" id="scoreB">0</div>
</div>

</div>

<div class="breakbox">
Break :
<span id="breakScore">0</span>
</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDIFnGZscfbuaST3cLkl--cTPAjqHm75zI",
authDomain: "wp-snooker-club.firebaseapp.com",
databaseURL: "https://wp-snooker-club-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "wp-snooker-club",
storageBucket: "wp-snooker-club.firebasestorage.app",
messagingSenderId: "825086242132",
appId: "1:825086242132:web:54f00b00f84e33aa662cc1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"match"),(snapshot)=>{

const data = snapshot.val();

if(!data) return;

document.getElementById("playerA").textContent =
data.playerA || "นักกีฬา A";

document.getElementById("playerB").textContent =
data.playerB || "นักกีฬา B";

document.getElementById("scoreA").textContent =
data.scoreA || 0;

document.getElementById("scoreB").textContent =
data.scoreB || 0;

document.getElementById("frameA").textContent =
data.frameA || 0;

document.getElementById("frameB").textContent =
data.frameB || 0;

document.getElementById("breakScore").textContent =
data.breakScore || 0;

if(data.Winner && data.Winner !== ""){

document.getElementById("logoBox").style.display="none";
document.getElementById("winnerBox").style.display="block";

document.getElementById("winnerName").textContent =
data.Winner + " ชนะ";

}else{

document.getElementById("logoBox").style.display="block";
document.getElementById("winnerBox").style.display="none";

}

});

</script>

</body>
</html>
