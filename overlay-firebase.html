<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:transparent;
overflow:hidden;
font-family:Arial,sans-serif;
}

#scorebar{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:1200px;

background:#111;
border:3px solid #f5c400;
border-radius:30px;

display:flex;
align-items:center;
justify-content:space-between;

padding:10px 25px;
box-sizing:border-box;

color:white;
}

.player{
width:35%;
text-align:center;
}

.name{
font-size:28px;
font-weight:bold;
}

.score{
font-size:52px;
font-weight:bold;
color:#ffd700;
}

.center{
width:30%;
text-align:center;
}

.frame{
font-size:36px;
font-weight:bold;
color:#ffd700;
}

.break{
font-size:20px;
margin-top:5px;
}

.logo{
position:absolute;
top:20px;
left:20px;
height:80px;
}
</style>
</head>

<body>

<img src="wp-logo.png" class="logo">

<div id="scorebar">

<div class="player">
<div class="name" id="playerA">Player A</div>
<div class="score" id="scoreA">0</div>
</div>

<div class="center">
<div class="frame">
<span id="frameA">0</span>
 -
<span id="frameB">0</span>
</div>
<div>FRAME</div>
<div class="break">
Break : <span id="breakScore">0</span>
</div>
</div>

<div class="player">
<div class="name" id="playerB">Player B</div>
<div class="score" id="scoreB">0</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDIFnGZscfbuaST3cLkl--cTPAjqHm75zI",
authDomain: "wp-snooker-club.firebaseapp.com",
databaseURL: "https://wp-snooker-club-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "wp-snooker-club",
storageBucket: "wp-snooker-club.firebasestorage.app",
messagingSenderId: "825086242132",
appId: "1:825086242132:web:54f00b00f84e33aa662cc1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"match"), (snapshot)=>{

const data = snapshot.val();
if(!data) return;

document.getElementById("playerA").textContent =
data.playerA || "Player A";

document.getElementById("playerB").textContent =
data.playerB || "Player B";

document.getElementById("scoreA").textContent =
data.scoreA || 0;

document.getElementById("scoreB").textContent =
data.scoreB || 0;

document.getElementById("frameA").textContent =
data.frameA || 0;

document.getElementById("frameB").textContent =
data.frameB || 0;

document.getElementById("breakScore").textContent =
data.breakScore || 0;

});
</script>

</body>
</html>
