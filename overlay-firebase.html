<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
background:transparent;
overflow:hidden;
font-family:Arial,sans-serif;
}
#topMessage{
position:absolute;
bottom:170px;
left:50%;
transform:translateX(-50%);
background:#111;
border:2px solid #f5c400;
border-radius:20px;
padding:8px 25px;
color:#ffd700;
font-size:24px;
font-weight:bold;
}
#scorebar{
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:1200px;
background:#111;
border:3px solid #f5c400;
border-radius:30px;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 25px;
box-sizing:border-box;
color:white;
}
.player{
width:35%;
text-align:center;
}
.name{
font-size:28px;
font-weight:bold;
}
.score{
font-size:52px;
font-weight:bold;
color:#ffd700;
}
.total{
font-size:18px;
margin-top:5px;
color:#ddd;
}
.center{
width:30%;
text-align:center;
}
.frame{
font-size:36px;
font-weight:bold;
color:#ffd700;
}
#bottomMessage{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:#111;
border:2px solid #f5c400;
border-radius:20px;
padding:6px 20px;
color:white;
font-size:18px;
}
</style>
</head>
<body>
<div id="topMessage">รอบชิงชนะเลิศ โต๊ะ 1</div>
<div id="scorebar">
<div class="player">
<div class="name" id="playerA">Player A</div>
<div class="score" id="scoreA">0</div>
<div class="total">รวม : <span id="totalA">0</span></div>
</div>
<div class="center">
<div class="frame">
<span id="frameA">0</span>
 -
<span id="frameB">0</span>
</div>
<div>FRAME</div>
</div>
<div class="player">
<div class="name" id="playerB">Player B</div>
<div class="score" id="scoreB">0</div>
<div class="total">รวม : <span id="totalB">0</span></div>
</div>
</div>
<div id="bottomMessage">ถ่ายทอดสดโดย WP Snooker Club</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
const firebaseConfig = {
apiKey: "AIzaSyDIFnGZscfbuaST3cLkl--cTPAjqHm75zI",
authDomain: "wp-snooker-club.firebaseapp.com",
databaseURL: "https://wp-snooker-club-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "wp-snooker-club",
storageBucket: "wp-snooker-club.firebasestorage.app",
messagingSenderId: "825086242132",
appId: "1:825086242132:web:54f00b00f84e33aa662cc1"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
onValue(ref(db,"match"), (snapshot)=>{
const data = snapshot.val();
if(!data) return;
document.getElementById("playerA").textContent = data.playerA || "Player A";
document.getElementById("playerB").textContent = data.playerB || "Player B";
document.getElementById("scoreA").textContent = data.scoreA || 0;
document.getElementById("scoreB").textContent = data.scoreB || 0;
document.getElementById("frameA").textContent = data.frameA || 0;
document.getElementById("frameB").textContent = data.frameB || 0;
document.getElementById("totalA").textContent = data.totalA || 0;
document.getElementById("totalB").textContent = data.totalB || 0;
document.getElementById("topMessage").textContent =
data.topMessage || "";
document.getElementById("bottomMessage").textContent =
data.bottomMessage || "";
});
</script>
</body>
</html>
