<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP Snooker Overlay</title>
<style>
body{
margin:0;
background:transparent;
overflow:hidden;
font-family:Arial,sans-serif;
}
#topMessage{
position:absolute;
bottom:100px;
left:50%;
transform:translateX(-50%);
background:#008a4e;
color:white;
padding:4px 14px;
border-radius:10px;
font-size:14px;
font-weight:bold;
box-shadow:0 0 10px rgba(0,0,0,.5);
white-space:nowrap;
}
#scorebar{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:72%;
max-width:820px;
background:#101010;
border:2px solid #008a4e;
border-radius:18px;
display:flex;
align-items:center;
justify-content:space-between;
padding:8px 15px;
box-sizing:border-box;
box-shadow:0 0 15px rgba(0,0,0,.6);
color:white;
}
.player{
width:35%;
text-align:center;
}
.name{
font-size:20px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}
.score{
font-size:40px;
font-weight:bold;
color:#00d46a;
line-height:1;
margin-top:4px;
}
.total{
font-size:13px;
margin-top:4px;
color:#d0d0d0;
}
.center{
width:30%;
text-align:center;
border-left:1px solid #333;
border-right:1px solid #333;
padding:0 8px;
}
.frame{
font-size:28px;
font-weight:bold;
color:white;
line-height:1;
}
.frameText{
font-size:12px;
letter-spacing:2px;
margin-top:3px;
color:#00d46a;
}
.bottomText{
margin-top:6px;
font-size:11px;
color:#cfcfcf;
line-height:1.2;
}
</style>
</head>
<body>
<div id="topMessage">รอบชิงชนะเลิศ โต๊ะ 1</div>
<div id="scorebar">
<div class="player">
<div class="name" id="playerA">Player A</div>
<div class="score" id="scoreA">0</div>
<div class="total">
รวม : <span id="totalA">0</span>
</div>
</div>
<div class="center">
<div class="frame">
<span id="frameA">0</span>
 -
<span id="frameB">0</span>
</div>
<div class="frameText">FRAME</div>
<div class="bottomText" id="bottomMessage">
ถ่ายทอดสดโดย WP Snooker Club
</div>
</div>
<div class="player">
<div class="name" id="playerB">Player B</div>
<div class="score" id="scoreB">0</div>
<div class="total">
รวม : <span id="totalB">0</span>
</div>
</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
const firebaseConfig = {
apiKey: "AIzaSyDIFnGZscfbuaST3cLkl--cTPAjqHm75zI",
authDomain: "wp-snooker-club.firebaseapp.com",
databaseURL: "https://wp-snooker-club-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "wp-snooker-club",
storageBucket: "wp-snooker-club.firebasestorage.app",
messagingSenderId: "825086242132",
appId: "1:825086242132:web:54f00b00f84e33aa662cc1"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
onValue(ref(db,"match"), (snapshot)=>{
const data = snapshot.val();
if(!data) return;
document.getElementById("playerA").textContent =
data.playerA || "Player A";
document.getElementById("playerB").textContent =
data.playerB || "Player B";
document.getElementById("scoreA").textContent =
data.scoreA || 0;
document.getElementById("scoreB").textContent =
data.scoreB || 0;
document.getElementById("frameA").textContent =
data.frameA || 0;
document.getElementById("frameB").textContent =
data.frameB || 0;
document.getElementById("totalA").textContent =
data.totalA || 0;
document.getElementById("totalB").textContent =
data.totalB || 0;
document.getElementById("topMessage").textContent =
data.topMessage || "";
document.getElementById("bottomMessage").textContent =
data.bottomMessage || "";
});
</script>
</body>
</html>
