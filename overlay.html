<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WP Snooker Overlay</title>
<style>
body{
margin:0;
background:transparent;
font-family:Arial,sans-serif;
}
.bar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
width:1200px;
background:rgba(0,0,0,.85);
border:3px solid gold;
border-radius:15px;
color:white;
padding:15px;
text-align:center;
}
.title{
font-size:32px;
color:gold;
font-weight:bold;
}
.score{
font-size:50px;
margin-top:10px;
}
.break{
font-size:24px;
margin-top:5px;
}
</style>
</head>
<body>

<div class="bar">
<div class="title">WP Snooker Club</div>
<div class="score">
<span id="playerA">นักกีฬา A</span>
&nbsp;
<span id="scoreA">0</span>

|

<span id="frameA">0</span>
-
<span id="frameB">0</span>

|

<span id="scoreB">0</span>
&nbsp;
<span id="playerB">นักกีฬา B</span>
</div>

<div class="break">
Break : <span id="breakScore">0</span>
</div>
</div>

</body>
</html>
