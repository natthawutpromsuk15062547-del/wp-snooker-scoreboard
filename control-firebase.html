<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WP Snooker Control Firebase</title>
<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
padding:20px;
text-align:center;
}
h1{
color:gold;
}
.card{
background:#222;
padding:15px;
margin:15px 0;
border-radius:12px;
}
input{
width:90%;
padding:12px;
font-size:18px;
margin:5px;
border-radius:8px;
border:none;
}
button{
padding:12px;
margin:4px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}
..redball{
background:#d60000;
color:white;
}

.yellowball{
background:#ffd700;
color:black;
}

.greenball{
background:#00a651;
color:white;
}

.brownball{
background:#8b4513;
color:white;
}

.blueball{
background:#0066ff;
color:white;
}

.pinkball{
background:#ff69b4;
color:white;
}

.blackball{
background:#000;
color:white;
border:1px solid #666;
}

.blue{
background:#007bff;
color:white;
}

.red{
background:#dc3545;
color:white;
}
</style>
</head>
<body>
<h1>WP Snooker Club</h1>
<div class="card">
<h2>ข้อมูลเพิ่มเติม</h2>
<input id="topMessage" placeholder="ข้อความด้านบน">
<input id="totalA" type="number" value="0" placeholder="คะแนนรวม A">
<input id="totalB" type="number" value="0" placeholder="คะแนนรวม B">
<input id="bottomMessage" placeholder="ข้อความด้านล่าง">
<button class="blue" onclick="saveExtra()">
บันทึกข้อมูลเพิ่มเติม
</button>
</div>
<div class="card">
<h2>ผู้เล่น A</h2>

<input id="playerA" value="นักกีฬา A">

<br>

<button class="redball" onclick="addScoreA(1)">แดง 1</button>
<button class="yellowball" onclick="addScoreA(2)">เหลือง 2</button>
<button class="greenball" onclick="addScoreA(3)">เขียว 3</button>
<button class="brownball" onclick="addScoreA(4)">น้ำตาล 4</button>
<button class="blueball" onclick="addScoreA(5)">น้ำเงิน 5</button>
<button class="pinkball" onclick="addScoreA(6)">ชมพู 6</button>
<button class="blackball" onclick="addScoreA(7)">ดำ 7</button>

<br><br>

<button class="redball" onclick="addScoreA(-1)">-แดง</button>
<button class="yellowball" onclick="addScoreA(-2)">-เหลือง</button>
<button class="greenball" onclick="addScoreA(-3)">-เขียว</button>
<button class="brownball" onclick="addScoreA(-4)">-น้ำตาล</button>
<button class="blueball" onclick="addScoreA(-5)">-น้ำเงิน</button>
<button class="pinkball" onclick="addScoreA(-6)">-ชมพู</button>
<button class="blackball" onclick="addScoreA(-7)">-ดำ</button>

<br><br>

<button class="blue" onclick="frameA()">Frame +1</button>
<button class="red" onclick="minusFrameA()">Frame -1</button>

</div>
  
<div class="card">
<h2>ผู้เล่น B</h2>

<input id="playerB" value="นักกีฬา B">

<br>

<button class="redball" onclick="addScoreB(1)">แดง 1</button>
<button class="yellowball" onclick="addScoreB(2)">เหลือง 2</button>
<button class="greenball" onclick="addScoreB(3)">เขียว 3</button>
<button class="brownball" onclick="addScoreB(4)">น้ำตาล 4</button>
<button class="blueball" onclick="addScoreB(5)">น้ำเงิน 5</button>
<button class="pinkball" onclick="addScoreB(6)">ชมพู 6</button>
<button class="blackball" onclick="addScoreB(7)">ดำ 7</button>
<br><br>

<button class="redball" onclick="addScoreB(-1)">-แดง</button>
<button class="yellowball" onclick="addScoreB(-2)">-เหลือง</button>
<button class="greenball" onclick="addScoreB(-3)">-เขียว</button>
<button class="brownball" onclick="addScoreB(-4)">-น้ำตาล</button>
<button class="blueball" onclick="addScoreB(-5)">-น้ำเงิน</button>
<button class="pinkball" onclick="addScoreB(-6)">-ชมพู</button>
<button class="blackball" onclick="addScoreB(-7)">-ดำ</button>
<br><br>

<button class="blue" onclick="frameB()">Frame +1</button>
<button class="red" onclick="minusFrameB()">Frame -1</button>

</div>
<div class="card">
<button class="blue" onclick="saveNames()">
บันทึกชื่อ
</button>
<button class="red" onclick="resetMatch()">
Reset Match
</button>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, update, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
const firebaseConfig = {
apiKey: "AIzaSyDIFnGZscfbuaST3cLkl--cTPAjqHm75zI",
authDomain: "wp-snooker-club.firebaseapp.com",
databaseURL: "https://wp-snooker-club-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "wp-snooker-club",
storageBucket: "wp-snooker-club.firebasestorage.app",
messagingSenderId: "825086242132",
appId: "1:825086242132:web:54f00b00f84e33aa662cc1"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window.saveNames = async () => {
await update(ref(db,"match"),{
playerA:document.getElementById("playerA").value,
playerB:document.getElementById("playerB").value
});
};
window.saveExtra = async () => {
await update(ref(db,"match"),{
topMessage:document.getElementById("topMessage").value,
bottomMessage:document.getElementById("bottomMessage").value,
totalA:Number(document.getElementById("totalA").value),
totalB:Number(document.getElementById("totalB").value)
});
};
window.addScoreA = async (n) => {
const s = await get(ref(db,"match"));
const d = s.val() || {};
await update(ref(db,"match"),{
scoreA:Math.max((d.scoreA||0)+n,0)
});
};
window.addScoreB = async (n) => {
const s = await get(ref(db,"match"));
const d = s.val() || {};
await update(ref(db,"match"),{
scoreB:Math.max((d.scoreB||0)+n,0)
});
};
window.frameA = async () => {
const s = await get(ref(db,"match"));
const d = s.val() || {};
await update(ref(db,"match"),{
frameA:(d.frameA||0)+1
});
};
window.frameB = async () => {
const s = await get(ref(db,"match"));
const d = s.val() || {};
await update(ref(db,"match"),{
frameB:(d.frameB||0)+1
});
};
window.minusFrameA = async () => {
const s = await get(ref(db,"match"));
const d = s.val() || {};
await update(ref(db,"match"),{
frameA:Math.max((d.frameA||0)-1,0)
});
};
window.minusFrameB = async () => {
const s = await get(ref(db,"match"));
const d = s.val() || {};
await update(ref(db,"match"),{
frameB:Math.max((d.frameB||0)-1,0)
});
};
window.resetMatch = async () => {
await set(ref(db,"match"),{
playerA:"นักกีฬา A",
playerB:"นักกีฬา B",
scoreA:0,
scoreB:0,
frameA:0,
frameB:0,
totalA:0,
totalB:0,
topMessage:"",
bottomMessage:""
});
};
</script>
</body>
</html>
